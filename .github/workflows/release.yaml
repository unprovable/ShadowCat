name: Deploy CV to pages
on: push

jobs:
  rename-to-index:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: mv shadowcat.html index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
  deploy-pages:
    runs-on: ubuntu-latest
    needs: rename-to-index
    permissions:
      id-token: write
      pages: write
    steps:
      - uses: actions/deploy-pages@v4
